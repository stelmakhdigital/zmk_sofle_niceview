CONFIG_INPUT=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y
# CONFIG_ZMK_INPUT_AZOTEQ_IQS5XX_IDLE_SLEEPER=n
# CONFIG_INPUT_AZOTEQ_IQS5XX_INIT_PRIORITY=60

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# go to sleep after one hour (1*60*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_SLEEP=y

# Enable ZMK as a USB keyboard
CONFIG_ZMK_USB=y

# Enable ZMK as a Bluetooth keyboard
CONFIG_ZMK_BLE=y
